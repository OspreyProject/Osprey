name: 'Compile for Chrome'

on:
  push:
    branches: [ 'main', '2.0.0' ]
  pull_request:
    branches: [ 'main', '2.0.0' ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 'Checkout Repository'
        uses: actions/checkout@v6

      - name: 'Extract Version'
        id: get_version
        run: |
          VERSION=$(jq -r '.version' src/main/manifest.json)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: 'Minify CSS and HTML'
        run: |
          npm install -g html-minifier terser clean-css-cli
          find src/main -name '*.html' -exec html-minifier --collapse-whitespace --remove-comments --minify-css true --minify-js true -o {} {} \;
          find src/main -name '*.css' -exec cleancss -o {} {} \;
          find src/main -name '*.js' -exec terser {} -o {} \;

      - name: 'Upload Artifact'
        uses: actions/upload-artifact@v7
        with:
          name: Osprey-${{ env.VERSION }}-chrome
          path: src/main
